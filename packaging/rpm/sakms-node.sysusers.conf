u sakms-node - "sakms-node worker node daemon" - /sbin/nologin
# Shared local group authorizing local access to the mediaRoots control
# socket (/run/sakms-node/control.sock) -- see the sakms-node-tray mediaRoots
# UI plan's socket-perms section (Option 2): group membership in
# sakms-media-config IS the authorization boundary for that socket, not a
# separate permission/uid check. sakms-node.service adds the daemon to this
# group via SupplementaryGroups= (systemd resolves that by name at service
# start; it does not require an "m" membership line here). The RPM's %post
# adds the console/desktop user to this group so sakms-node-tray can reach
# the socket -- see sakms-node.spec.
g sakms-media-config -
